# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: cross_system_signal_dispatch
    status: active
    api: Callable.callv() with sorted Array[Subscriber]
    not: "Godot native Signal.emit() — connection-order FIFO, no priority mechanism"
    adr: docs/architecture/adr-0001-event-bus-architecture.md
    reason: "Priority-based execution order required for signals like loop_start where convert_warmth() must read state before reset_affection() clears it"
    referenced_by: []
    added: 2026-05-30
    revised: ""
  - purpose: save_file_format
    status: active
    api: "ResourceSaver.save() / ResourceLoader.load() with .tres GameState Resource"
    not: "JSON with manual serialization — loses typed Resource system; binary .res — loses debug readability"
    adr: docs/architecture/adr-0002-save-load-serialization-format.md
    reason: ".tres text format is debuggable in any editor during development while retaining Godot's typed Resource serialization"
    referenced_by: []
    added: 2026-05-30
    revised: ""
  - purpose: time_consumption_protocol
    status: active
    api: "EventBus request/validate/deduct/notify: time_cost_requested(units) → TimeManager validates → time_advanced(units, remaining)"
    not: "Direct time_remaining mutation by action systems — bypasses validation"
    adr: docs/architecture/adr-0004-time-loop-state-machine.md
    reason: "Single choke point for time validation prevents double-counting, negative time, and time consumption during collapse"
    referenced_by: []
    added: 2026-05-30
    revised: ""
    status: active
    api: "EventBus request/validate/deduct/notify: time_cost_requested(units) → TimeManager validates → time_advanced(units, remaining)"
    not: "Direct time_remaining mutation by action systems — bypasses validation"
    adr: docs/architecture/adr-0004-time-loop-state-machine.md
    reason: "Single choke point for time validation prevents double-counting, negative time, and time consumption during collapse"
    referenced_by: []
    added: 2026-05-30
    revised: ""
  - purpose: settings_persistence
    status: active
    api: ConfigFile (.ini format)
    not: "Store settings in GameState .tres — settings should survive save deletion"
    adr: docs/architecture/adr-0002-save-load-serialization-format.md
    reason: "Settings (volume, accessibility, input remapping) are user preferences, not game progress — they must persist even when save files are deleted"
    referenced_by: []
    added: 2026-05-30
    revised: ""

