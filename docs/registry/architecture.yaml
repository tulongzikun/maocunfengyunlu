# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: save-load
    status: active
    budget_ms: 100.0
    adr: docs/architecture/adr-0002-save-load-serialization-format.md
    notes: "Auto-save must complete within 100ms during loop collapse whiteout sequence"
    referenced_by:
      - docs/architecture/adr-0002-save-load-serialization-format.md
    added: 2026-05-30
    revised: ""

# Example:
